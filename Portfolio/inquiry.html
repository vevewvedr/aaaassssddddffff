<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
    <style>
        @font-face {
            font-family: 'NanumBarunpen';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NanumBarunpen.woff') format('woff');
        }
        * {
            font-family: 'NanumBarunpen', sans-serif;
        }
    </style>
    <title>Document</title>
</head>
<body>
 <div class="relative min-h-screen bg-cover bg-center" style="background-image: url('./image/bg_ocean.jpg');">
  <button id="menu-toggle" aria-expanded="false" aria-controls="mobile-menu" class="fixed top-8 left-8 z-100 inline-flex h-12 w-12 items-center justify-center rounded-full bg-white/85 text-indigo-900 shadow-lg backdrop-blur-md transition hover:bg-white">
    <span class="sr-only">메뉴 열기</span>
    <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M4 7h16M4 12h16M4 17h16" />
    </svg>
  </button>
  <header id="mobile-menu" class="fixed inset-y-0 left-0 z-50 w-64 max-w-full transform -translate-x-full opacity-0 transition-all duration-300 ease-in-out bg-white/10 backdrop-blur-xl border-r border-white/20 shadow-lg">
    <nav aria-label="Global" class="flex h-full flex-col bg-transparent p-6">
      <div class="flex items-center">
        <a href="index.html" class="-m-1.5 p-1.5 inline-flex items-center">
          <span class="sr-only">kw project</span>
          <img src="./image/logo.png" alt="" class="h-20 w-auto" />
        </a>
      </div>
      <div class="flex flex-1 flex-col justify-start space-y-6 pt-20 px-5">
            <a href="index.html" class="block w-40 text-center rounded-xl bg-white/30 border border-white/30 p-2 font-bold text-2xl text-indigo-900 backdrop-blur-md transition hover:bg-white/40">메인</a>
            <a href="story.html" class="block w-40 text-center rounded-xl bg-white/30 border border-white/30 p-2 font-bold text-2xl text-indigo-900 backdrop-blur-md transition hover:bg-white/40">스토리</a>
            <a href="character.html" class="block w-40 text-center rounded-xl bg-white/30 border border-white/30 p-2 font-bold text-2xl text-indigo-900 backdrop-blur-md transition hover:bg-white/40">캐릭터 소개</a>
            <a href="gallery.html" class="block w-40 text-center rounded-xl bg-white/30 border border-white/30 p-2 font-bold text-2xl text-indigo-900 backdrop-blur-md transition hover:bg-white/40">스크린샷</a>
            <a href="inquiry.html" class="block w-40 text-center rounded-xl bg-white/30 border border-white/30 p-2 font-bold text-2xl text-indigo-900 backdrop-blur-md transition hover:bg-white/40">사전예약</a>
        </div>
      <div class="px-5 pb-10">
        <a href="login.html" class="block w-40 text-center rounded-xl bg-white/30 border border-white/30 p-2 font-bold text-2xl text-indigo-900 backdrop-blur-md transition hover:bg-white/40">로그인<span aria-hidden="true">&rarr;</span></a>
      </div>
    </nav>

    
   </header>
   <br>
   <br>
  <div class="mx-auto max-w-2xl text-center">
    <h2 class="text-4xl font-semibold tracking-tight text-balance text-indigo-900 sm:text-5xl">사전예약 등록하기</h2>
    
  </div>
  <form action="#" method="POST" class="mx-auto mt-10 max-w-xl border border-white/25 bg-white/15 px-5 py-6 shadow-2xl backdrop-blur-md">
    <div class="grid grid-cols-1 gap-x-8 gap-y-2 sm:grid-cols-2">
      <div class="sm:col-span-2">
        <label for="first-name" class="block text-sm/6 font-semibold text-gray-900">이름</label>
        <div class="mt-2.5">
          <input id="name" type="text" name="name" autocomplete="name" class="block w-full rounded-md bg-white px-3.5 py-2 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600" />
        </div>
      </div>
      <div class="sm:col-span-2">
        <label for="id" class="block text-sm/6 font-semibold text-gray-900">계정</label>
        <div class="mt-2.5">
          <input id="id" type="text" name="id" autocomplete="organization" class="block w-full rounded-md bg-white px-3.5 py-2 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600" />
        </div>
      </div>
      <div class="sm:col-span-2">
        <label for="email" class="block text-sm/6 font-semibold text-gray-900">Email</label>
        <div class="mt-2.5">
          <input id="email" type="email" name="email" autocomplete="email" class="block w-full rounded-md bg-white px-3.5 py-2 text-base text-gray-900 outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600" />
        </div>
      </div>
      <div class="sm:col-span-2">
        <label for="phone-number" class="block text-sm/6 font-semibold text-gray-900">전화번호</label>
        <div class="mt-2.5">
          <div class="flex rounded-md bg-white outline-1 -outline-offset-1 outline-gray-800 has-[input:focus-within]:outline-2 has-[input:focus-within]:-outline-offset-2 has-[input:focus-within]:outline-indigo-600">
            <div class="grid shrink-0 grid-cols-1 focus-within:relative">
              <select id="country" name="country" autocomplete="country" aria-label="Country" class="col-start-1 row-start-1 w-full appearance-none rounded-md py-2 pr-7 pl-3.5 text-base text-gray-500 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6">
                <option>KR</option>
                <option>JP</option>
                <option>CN</option>
                <option>US</option>
                <option>EU</option>
              </select>
              
            </div>
            <input id="phone-number" type="text" name="phone-number" placeholder="123-456-7890" class="block min-w-0 grow py-1.5 pr-3 pl-1 text-base text-gray-900 placeholder:text-gray-400 focus:outline-none sm:text-sm/6" />
          </div>
        </div>
      </div>
    <div class="flex gap-x-4 sm:col-span-2">
        <div class="flex h-6 items-center">
          <div class="group relative inline-flex w-8 shrink-0 rounded-full bg-gray-200 p-px inset-ring inset-ring-gray-900/5 outline-offset-2 outline-indigo-600 transition-colors duration-200 ease-in-out has-checked:bg-indigo-600 has-focus-visible:outline-2">
            <span class="size-4 rounded-full bg-white shadow-xs ring-1 ring-gray-900/5 transition-transform duration-200 ease-in-out group-has-checked:translate-x-3.5"></span>
            <input id="agree-to-policies" type="checkbox" name="agree-to-policies" aria-label="Agree to policies" class="absolute inset-0 size-full appearance-none focus:outline-hidden" />
          </div>
        </div>
        <label for="agree-to-policies" class="text-sm/6 text-gray-600">
          개인정보 제공에 동의하십니까?
          <a href="https://www.pipc.go.kr/np/default/page.do?mCode=H010000000" class="font-semibold whitespace-nowrap text-indigo-600">개인정보 처리방침</a>.
        </label>
    </div>

    <div class="mt-10 sm:col-span-2">
      <button type="submit" class="block w-full rounded-md bg-indigo-600 px-3.5 py-2.5 text-center text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">사전예약 하기</button>
    </div>
   
  </form>
</div>
  
  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');

    const setMenuState = (isOpen) => {
      mobileMenu.classList.toggle('translate-x-0', isOpen);
      mobileMenu.classList.toggle('-translate-x-full', !isOpen);
      mobileMenu.classList.toggle('opacity-100', isOpen);
      mobileMenu.classList.toggle('opacity-0', !isOpen);
      menuToggle.setAttribute('aria-expanded', String(isOpen));
    };

    menuToggle.addEventListener('click', () => {
      const isOpen = !mobileMenu.classList.contains('translate-x-0');
      setMenuState(isOpen);
    });

    mobileMenu.addEventListener('mouseleave', () => {
      if (mobileMenu.classList.contains('translate-x-0')) {
        setMenuState(false);
      }
    });
  </script>



</body>
</html>
