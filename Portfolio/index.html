   </header>

  <div class="min-h-screen flex flex-col md:flex-row">
    
    <div class="w-full md:w-2/3 flex items-center justify-center px-8 md:px-8">
      
      <div class="max-w-auto text-center md:text-left md:-mt-20">
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight whitespace-pre text-center text-indigo-900">바다는 큰 위기!!   당신이 마지막 희망?!</h1>
        <p class="mt-6 text-2xl font-bold text-indigo-900">갑자기 나타난 의문의 세력, 우리 모두의 것인 바다를 집어삼켜 버리는데! <br> 당신의 선택이 바다를 구할 수 있을까요?</p>
        <div class="mt-8 flex items-center md:justify-center justify-center gap-x-4">

          <a href="story.html" class="text-lg font-bold text-indigo-900"> 저에 대해 궁금하신가요? <span aria-hidden="true">→</span></a>
        </div>

    </div>

  </div>

  <div class="fixed right-40 top-1/2 z-20 -translate-y-1/2 pointer-events-none ">
    <img src="./image/ss_main.png"  alt="ss main" class="max-h-[100vh] w-auto object-contain" />
  </div>
   
  
  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');

    const setMenuState = (isOpen) => {
      mobileMenu.classList.toggle('translate-x-0', isOpen);
      mobileMenu.classList.toggle('-translate-x-full', !isOpen);
      mobileMenu.classList.toggle('opacity-100', isOpen);
      mobileMenu.classList.toggle('opacity-0', !isOpen);
      menuToggle.setAttribute('aria-expanded', String(isOpen));
    };

    menuToggle.addEventListener('click', () => {
      const isOpen = !mobileMenu.classList.contains('translate-x-0');
      setMenuState(isOpen);
    });

    mobileMenu.addEventListener('mouseleave', () => {
      if (mobileMenu.classList.contains('translate-x-0')) {
        setMenuState(false);
      }
    });
  </script>


</body>
</html>
