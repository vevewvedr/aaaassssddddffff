<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
    <style>
        @font-face {
            font-family: 'NanumBarunpen';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NanumBarunpen.woff') format('woff');
        }
        * {
            font-family: 'NanumBarunpen', sans-serif;
        }
    </style>
    <title>Document</title>
</head>
<body>
 <div class="relative min-h-screen bg-cover bg-center" style="background-image: url('./image/bg_ocean.jpg');">
  <button id="menu-toggle" aria-expanded="false" aria-controls="mobile-menu" class="fixed top-8 left-8 z-100 inline-flex h-12 w-12 items-center justify-center rounded-full bg-white/85 text-indigo-900 shadow-lg backdrop-blur-md transition hover:bg-white">
    <span class="sr-only">메뉴 열기</span>
    <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M4 7h16M4 12h16M4 17h16" />
    </svg>
  </button>
  <header id="mobile-menu" class="fixed inset-y-0 left-0 z-50 w-64 max-w-full transform -translate-x-full opacity-0 transition-all duration-300 ease-in-out bg-white/10 backdrop-blur-xl border-r border-white/20 shadow-lg">
    <nav aria-label="Global" class="flex h-full flex-col bg-transparent p-6">
      <div class="flex items-center">
        <a href="index.html" class="-m-1.5 p-1.5 inline-flex items-center">
          <span class="sr-only">kw project</span>
          <img src="./image/logo.png" alt="" class="h-20 w-auto" />
        </a>
      </div>
      <div class="flex flex-1 flex-col justify-start space-y-6 pt-20 px-5">
          <a href="index.html" class="block w-40 text-center rounded-xl bg-white/30 border border-white/30 p-2 font-bold text-2xl text-indigo-900 backdrop-blur-md transition hover:bg-white/40">메인</a>
          <a href="story.html" class="block w-40 text-center rounded-xl bg-white/30 border border-white/30 p-2 font-bold text-2xl text-indigo-900 backdrop-blur-md transition hover:bg-white/40">스토리</a>
          <a href="character.html" class="block w-40 text-center rounded-xl bg-white/30 border border-white/30 p-2 font-bold text-2xl text-indigo-900 backdrop-blur-md transition hover:bg-white/40">캐릭터 소개</a>
          <a href="gallery.html" class="block w-40 text-center rounded-xl bg-white/30 border border-white/30 p-2 font-bold text-2xl text-indigo-900 backdrop-blur-md transition hover:bg-white/40">스크린샷</a>
          <a href="inquiry.html" class="block w-40 text-center rounded-xl bg-white/30 border border-white/30 p-2 font-bold text-2xl text-indigo-900 backdrop-blur-md transition hover:bg-white/40">사전예약</a>
      </div>
      <div class="px-5 pb-10">
        <a href="login.html" class="block w-40 text-center rounded-xl bg-white/30 border border-white/30 p-2 font-bold text-2xl text-indigo-900 backdrop-blur-md transition hover:bg-white/40">로그인<span aria-hidden="true">&rarr;</span></a>
      </div>
    </nav>
   </header>

<main class="mx-auto flex h-screen max-w-7xl flex-col justify-center px-4 py-3 sm:px-6 lg:px-8">
   <h1 class="text-3xl font-bold text-center mb-5 text-indigo-900">스크린샷</h1>

  <div class="grid gap-3 max-w-6xl mx-auto border border-white/25 bg-white/15 px-4 py-4 shadow-2xl backdrop-blur-md">
        <div class="main-display">
      <img id="topImage" class="w-[1280px] max-w-auto object-center h-[65vh] max-h-[720px] object-cover" src="./image/bg6.jpg" alt="Main Display">
        </div>

    <div class="thumbnail-list grid grid-cols-5 gap-2">
      <img class="thumb w-full h-24 rounded-lg object-cover object-center cursor-pointer opacity-100 hover:scale-105 transition-transform duration-200" src="./image/bg2.jpg" alt="Thumbnail 1">
      <img class="thumb w-full h-24 rounded-lg object-cover object-center cursor-pointer opacity-60 hover:scale-105 transition-transform duration-200" src="./image/bg3.jpg" alt="Thumbnail 2">
      <img class="thumb w-full h-24 rounded-lg object-cover object-center cursor-pointer opacity-60 hover:scale-105 transition-transform duration-200" src="./image/bg4.jpg" alt="Thumbnail 3">
      <img class="thumb w-full h-24 rounded-lg object-cover object-center cursor-pointer opacity-60 hover:scale-105 transition-transform duration-200" src="./image/bg5.jpg" alt="Thumbnail 4">
      <img class="thumb w-full h-24 rounded-lg object-cover object-center cursor-pointer opacity-60 hover:scale-105 transition-transform duration-200" src="./image/bg1.jpg" alt="Thumbnail 5">
        </div>

        <script>
        const topImage = document.getElementById("topImage");
        const thumbList = document.querySelector(".thumbnail-list");
        const thumbs = document.querySelectorAll(".thumb");

        thumbList.addEventListener("click", function (event) {
            if (event.target.classList.contains("thumb")) {
                topImage.src = event.target.src;
                thumbs.forEach((thumb) => {
                    thumb.classList.remove("opacity-100");
                    thumb.classList.add("opacity-60");
                });
                event.target.classList.remove("opacity-60");
                event.target.classList.add("opacity-100");
            }
        });
        </script>

    </div>
    </main>
   
  </div>
  
  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const mobileMenu = document.getElementById('mobile-menu');

    const setMenuState = (isOpen) => {
      mobileMenu.classList.toggle('translate-x-0', isOpen);
      mobileMenu.classList.toggle('-translate-x-full', !isOpen);
      mobileMenu.classList.toggle('opacity-100', isOpen);
      mobileMenu.classList.toggle('opacity-0', !isOpen);
      menuToggle.setAttribute('aria-expanded', String(isOpen));
    };

    menuToggle.addEventListener('click', () => {
      const isOpen = !mobileMenu.classList.contains('translate-x-0');
      setMenuState(isOpen);
    });

    mobileMenu.addEventListener('mouseleave', () => {
      if (mobileMenu.classList.contains('translate-x-0')) {
        setMenuState(false);
      }
    });
  </script>


</body>
</html>
